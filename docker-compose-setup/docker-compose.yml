version: '3.8'

services:

  postgres:

    image: postgres:16

    container_name: hotel-postgres

    restart: always

    environment:
      POSTGRES_DB: hoteldb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/sql

volumes:
  postgres-data: